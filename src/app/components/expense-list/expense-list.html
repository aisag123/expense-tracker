<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="container mt-4">
      <h2 class="text-center mb-4">All Expences</h2>

      @for (expense of expenseService.expenses(); track expense.id) {
        <app-expense-item [expense]="expense"></app-expense-item>
      }
      @if (expenseService.expenses().length <= 0) {
        <div class="container mt-4">
          <div class="alert alert-info text-center">
            No expenses available. Please add a new expense.
          </div>
        </div>
      }
    </div>
  </div>
</div>
